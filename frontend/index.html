<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anavrin AI | ML Customer Support</title>
    <meta name="description" content="Advanced ML-powered customer support assistant with real-time intent classification.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <img src="/static/assets/product.png" alt="Anavrin AI Logo" style="width: 100%; height: 100%; object-fit: contain; border-radius: var(--radius-md);">
                    </div>
                    <div class="logo-text">
                        <h1>Anavrin AI</h1>
                        <span class="badge">ML-Powered</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-content">
                <div class="section">
                    <div class="section-header">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6m11-7h-6m-6 0H1"/></svg>
                        <span>System Status</span>
                    </div>
                    <div class="status-card" id="status-card">
                        <div class="status-indicator">
                            <span class="status-dot"></span>
                            <span class="status-text">Connecting...</span>
                        </div>
                        <div class="status-details">
                            <div class="detail-row">
                                <span>Model</span>
                                <span id="model-name">-</span>
                            </div>
                            <div class="detail-row">
                                <span>Intents</span>
                                <span id="intents-count">-</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-header">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                        <span>Last Query</span>
                    </div>
                    <div class="prediction-card" id="prediction-card">
                        <div class="prediction-row">
                            <span class="prediction-label">Intent</span>
                            <span class="prediction-value" id="last-intent">-</span>
                        </div>
                        <div class="prediction-row">
                            <span class="prediction-label">Confidence</span>
                            <span class="prediction-value" id="last-confidence">-</span>
                        </div>
                        <div class="prediction-row">
                            <span class="prediction-label">Category</span>
                            <span class="prediction-value" id="last-category">-</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="sidebar-footer">
                <a href="/api/metrics" target="_blank" class="footer-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 3v18h18"/>
                        <path d="M18 9l-5 5-2-2-4 4"/>
                        <circle cx="18" cy="9" r="2"/>
                    </svg>
                    Metrics Dashboard
                </a>
            </div>
        </aside>

        <!-- Main Chat -->
        <main class="main">
            <header class="header">
                <button class="menu-toggle" id="menu-toggle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                </button>
                <div class="header-info">
                    <h2>Customer Support</h2>
                    <p>E-commerce Assistant</p>
                </div>
                <div class="header-status">
                    <span class="online-dot"></span>
                    Online
                </div>
            </header>

            <div class="messages" id="messages">
                <div class="welcome-message">
                    <div class="welcome-icon">
                        <img src="/static/assets/bot.png" alt="Welcome Bot" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
                    </div>
                    <h3>How can I help you today?</h3>
                    <p>I can assist with orders, refunds, shipping, payments, and more.</p>
                    <div class="quick-actions">
                        <button class="quick-btn" onclick="sendQuickMessage('I want to cancel my order')">Cancel Order</button>
                        <button class="quick-btn" onclick="sendQuickMessage('Where is my refund?')">Check Refund</button>
                        <button class="quick-btn" onclick="sendQuickMessage('Track my order')">Track Order</button>
                        <button class="quick-btn" onclick="sendQuickMessage('Payment methods')">Payment Info</button>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <form class="input-form" id="input-form">
                    <input type="text" id="message-input" placeholder="Ask me anything..." autocomplete="off" required>
                    <button type="submit" id="send-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                    </button>
                </form>
                <p class="input-hint">Press Enter to send</p>
            </div>
        </main>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span id="toast-message"></span>
        <button class="toast-close" onclick="hideToast()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
